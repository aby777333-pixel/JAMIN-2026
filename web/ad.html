<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>JAMIN Properties — Live property</title>
    <link rel="icon" href="/logo.jpg" />
    <meta property="og:title" content="JAMIN Properties — Real property, captured live" />
    <meta property="og:description" content="View this property's live photo, location and contact." />
    <meta property="og:image" content="https://wonderful-cupcake-0d3074.netlify.app/logo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --red:#fd0001; --gold:#fbbc15; --gold-deep:#c8911e; --ink:#1a1a1a; --muted:#74746e; --paper:#f7f7f5; --line:#e6e7e2; --charcoal:#1a1a1a; }
      * { box-sizing:border-box; }
      html, body { margin:0; }
      body { font-family:Inter,-apple-system,"Segoe UI",sans-serif; background:var(--paper); color:var(--ink); }
      .wrap { max-width:480px; margin:0 auto; padding:16px 14px 40px; }
      .state { text-align:center; padding:64px 20px; color:var(--muted); }
      .state img { height:40px; margin-bottom:14px; }
      /* The shared image already carries the JAMIN branding, location, agent stamp
         and QR — show it CLEAN (no overlay) so nothing is duplicated. */
      .ad { width:100%; display:block; border-radius:18px; border:1px solid var(--line); background:#000; box-shadow:0 10px 30px rgba(0,0,0,.12); }
      .panel { background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px; margin-top:14px; }
      .panel h3 { margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); }
      .coord { display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:var(--paper); }
      .coord .c { font-family:monospace; font-size:13px; }
      .coord .p { color:var(--muted); font-size:12px; margin-top:2px; }
      .coord button { border:none; background:transparent; color:var(--red); font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap; }
      .btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
      .chip { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:1px solid var(--line); background:#fff; border-radius:12px; padding:11px 12px; font-size:13px; font-weight:600; color:var(--ink); text-decoration:none; }
      .chip:active { background:var(--paper); }
      .call { display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:10px; text-decoration:none; }
      .call .num { font-family:monospace; font-weight:700; color:var(--red); font-size:15px; }
      .call .t { margin-left:auto; color:var(--muted); font-size:12px; }
      .big { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:700; text-decoration:none; margin-top:10px; cursor:pointer; font-family:inherit; }
      .big.primary { background:var(--red); color:#fff; }
      .big.wa { background:#25d366; color:#fff; }
      .big.o { background:#fff; color:var(--ink); border:1px solid var(--line); }
      .big.blue { background:#2563eb; color:#fff; }
      .big.purple { background:#7c3aed; color:#fff; }
      .big.teal { background:#0ea5a4; color:#fff; }
      .big.dark { background:var(--charcoal); color:#fff; }
      .big.amber { background:var(--gold-deep); color:#fff; }
      .big.slate { background:#475569; color:#fff; }
      .big.gold { background:var(--gold); color:var(--ink); }
      /* Sender card */
      .sender { display:flex; align-items:center; gap:14px; background:var(--charcoal); color:#fff; border-radius:16px; padding:16px; margin-top:14px; }
      .sender .who b { font-size:16px; }
      .sender .who .ph { font-family:monospace; color:rgba(255,255,255,.85); font-size:14px; margin-top:3px; }
      .sender .who .ref { font-size:11px; letter-spacing:1px; color:var(--gold); margin-top:6px; text-transform:uppercase; }
      .sender .qr { margin-left:auto; background:#fff; padding:6px; border-radius:10px; cursor:pointer; flex-shrink:0; }
      .sender .qr img { display:block; width:84px; height:84px; }
      .sender .qr .hint { font-size:9px; color:var(--ink); text-align:center; margin-top:2px; letter-spacing:.5px; }
      /* Live chat */
      .chat-log { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; padding:4px 0 8px; }
      .msg { max-width:82%; padding:9px 12px; border-radius:14px; font-size:14px; line-height:1.4; word-wrap:break-word; }
      .msg.v { align-self:flex-end; background:var(--red); color:#fff; border-bottom-right-radius:4px; }
      .msg.a { align-self:flex-start; background:var(--paper); border:1px solid var(--line); border-bottom-left-radius:4px; }
      .msg .nm { font-size:10px; opacity:.7; margin-bottom:2px; }
      .chat-empty { color:var(--muted); font-size:13px; text-align:center; padding:14px 0; }
      .chat-in { display:flex; gap:8px; margin-top:8px; }
      .inp { flex:1; min-width:0; border:1px solid var(--line); border-radius:12px; padding:11px 12px; font-size:15px; font-family:inherit; }
      .send { border:none; background:var(--red); color:#fff; border-radius:12px; padding:0 16px; font-weight:700; cursor:pointer; }
      .tag { text-align:center; font-size:11px; font-weight:700; letter-spacing:2.5px; color:var(--gold-deep); margin:18px 0 4px; }
      /* QR modal */
      .modal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; padding:24px; z-index:50; }
      .modal.open { display:flex; }
      .modal .box { background:#fff; border-radius:20px; padding:22px; text-align:center; max-width:340px; width:100%; position:relative; }
      .modal .x { position:absolute; top:10px; right:12px; border:none; background:transparent; font-size:24px; line-height:1; color:var(--muted); cursor:pointer; }
      .modal img { width:240px; height:240px; max-width:100%; }
      .modal h4 { margin:4px 0 12px; font-size:15px; }
      .modal .row { display:flex; gap:8px; margin-top:14px; }
      .modal .row a, .modal .row button { flex:1; border:1px solid var(--line); background:#fff; border-radius:12px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; color:var(--ink); font-family:inherit; }
    </style>
  </head>
  <body>
    <div class="wrap" id="root"><div class="state">Loading…</div></div>

    <div class="modal" id="qrModal">
      <div class="box">
        <button class="x" id="qrClose" aria-label="Close">&times;</button>
        <h4>Scan to connect</h4>
        <img id="qrBig" alt="QR code" />
        <div class="row">
          <a id="qrDl" href="#" target="_blank" rel="noopener" download>⬇ Download</a>
          <button id="qrShare">↗ Share link</button>
        </div>
      </div>
    </div>

    <script>
      var SUPABASE_URL = 'https://oaqwnjgaypmuafvnfhxv.supabase.co';
      var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hcXduamdheXBtdWFmdm5maHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDI2ODAsImV4cCI6MjA5Nzc3ODY4MH0.2tfyC3Z8Kzib8FdLjnE-z8m830PZUd9vfcWtDXIqp3E';
      var REST = SUPABASE_URL + '/rest/v1/';
      var H = { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON };
      var SITE = location.origin;

      function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); }
      function phoneDigits(p) { var d = (p || '').replace(/\D/g, ''); if (d.length === 10) d = '91' + d; return d; }
      function qrSrc(data, size) { return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&margin=0&data=' + encodeURIComponent(data); }

      var parts = location.pathname.split('/').filter(Boolean); // ['ad','<slug>']
      var params = new URLSearchParams(location.search);
      var raw = (parts[1] || params.get('id') || '').trim();
      var slug = /^[A-Za-z0-9]{4,24}$/.test(raw) ? raw : '';
      var AD = null, pollTimer = null, lastCount = 0;
      var SETTINGS = { ad_contact_visibility: 'hidden' };
      var SHOW_CONTACT = false; // buyer protection: contact stays platform-mediated unless admin opts in

      function notFound(msg) {
        document.getElementById('root').innerHTML =
          '<div class="state"><img src="/logo.jpg" alt="JAMIN Properties" /><h2>' + esc(msg || 'Ad not found') + '</h2>' +
          '<p>This ad may have expired or the link is incomplete.</p>' +
          '<a class="big primary" href="/">Explore JAMIN Properties →</a></div>';
      }

      function loadAd() {
        fetch(REST + 'shared_ads?slug=eq.' + encodeURIComponent(slug) + '&select=*&limit=1', { headers: H })
          .then(function (r) { return r.json(); })
          .then(function (rows) { if (!rows || !rows.length) { notFound(); return; } AD = rows[0]; render(); })
          .catch(function () { notFound('Could not load this ad'); });
      }
      if (!slug) { notFound('Invalid link'); }
      else {
        fetch(REST + 'rpc/get_public_settings', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, H), body: '{}' })
          .then(function (r) { return r.json(); })
          .then(function (s) { if (s && typeof s === 'object') SETTINGS = s; })
          .catch(function () {})
          .finally(loadAd);
      }

      function render() {
        var ad = AD;
        SHOW_CONTACT = SETTINGS.ad_contact_visibility === 'visible';
        var hasGeo = ad.lat != null && ad.lng != null;
        var digits = SHOW_CONTACT ? phoneDigits(ad.agent_phone) : '';
        var name = ad.agent_name || 'JAMIN Partner';
        var refUrl = ad.agent_referral ? SITE + '/r/' + encodeURIComponent(ad.agent_referral) : SITE;

        var geoBtns = hasGeo ? (
          '<div class="btns">' +
            '<a class="chip" target="_blank" rel="noopener" href="https://earth.google.com/web/@' + ad.lat + ',' + ad.lng + ',100a,1000d,30y,0h,0t,0r">🌐 Earth view</a>' +
            '<a class="chip" target="_blank" rel="noopener" href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=' + ad.lat + ',' + ad.lng + '">🚶 Street view</a>' +
            '<a class="chip" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=' + ad.lat + ',' + ad.lng + '">🗺️ Open in Maps</a>' +
            '<a class="chip" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&destination=' + ad.lat + ',' + ad.lng + '">🧭 Directions</a>' +
          '</div>') : '';
        var coordRow = hasGeo ? (
          '<div class="coord"><div><div class="c">' + Number(ad.lat).toFixed(6) + ', ' + Number(ad.lng).toFixed(6) + '</div>' +
          (ad.place ? '<div class="p">' + esc(ad.place) + '</div>' : '') + '</div><button id="copyCoord">Copy</button></div>') :
          '<div class="p" style="color:var(--muted);font-size:13px">Location wasn’t captured for this photo.</div>';
        var callRow = (SHOW_CONTACT && ad.agent_phone) ? (
          '<a class="call" href="tel:' + esc(ad.agent_phone) + '">📞 <span class="num">' + esc(ad.agent_phone) + '</span><span class="t">Tap to call</span></a>') :
          '<div class="p" style="color:var(--muted);font-size:12.5px;margin-top:6px">🔒 For your safety, contact happens securely through JAMIN — message or call in-app below.</div>';

        var waText = encodeURIComponent('Hi ' + name + ', I saw the property you shared on JAMIN Properties' + (ad.place ? ' (' + ad.place + ')' : '') + '. Please share the details.');
        var actions =
          (digits ? '<a class="big wa" href="https://wa.me/' + digits + '?text=' + waText + '">💬 Chat on WhatsApp</a>' : '') +
          (digits ? '<a class="big primary" href="tel:' + esc(ad.agent_phone) + '">📞 Call ' + esc(name) + '</a>' : '') +
          '<button class="big blue" id="voiceCall">📞 Voice call (in-app)</button>' +
          '<button class="big purple" id="videoCall">📹 Video call (in-app)</button>' +
          '<button class="big teal" id="liveChatBtn">💬 Live chat here</button>' +
          '<button class="big dark" id="saveContact">👤 Save contact</button>' +
          '<a class="big amber" href="' + esc(ad.image_url) + '" target="_blank" rel="noopener" download>⬇ Download / save ad</a>' +
          '<button class="big slate" id="shareBtn">↗ Share this ad</button>' +
          '<a class="big gold" href="/">🏠 Explore more properties</a>';

        var sender =
          '<div class="sender"><div class="who"><b>' + esc(name) + '</b>' +
          (SHOW_CONTACT && ad.agent_phone ? '<div class="ph">' + esc(ad.agent_phone) + '</div>' : '') +
          (ad.agent_referral ? '<div class="ref">Ref ' + esc(ad.agent_referral) + '</div>' : '') +
          '<div style="font-size:11px;color:rgba(255,255,255,.55);margin-top:8px;letter-spacing:1px">SIGNATURE FOR FORTUNE</div></div>' +
          '<div class="qr" id="qrTrigger"><img alt="QR" src="' + qrSrc(refUrl, 120) + '" /><div class="hint">TAP TO ENLARGE</div></div></div>';

        var chat =
          '<div class="panel" id="chatPanel"><h3>Live chat with ' + esc(name) + '</h3>' +
          '<div class="chat-log" id="chatLog"><div class="chat-empty">Send a message — ' + esc(name.split(' ')[0]) + ' will reply here.</div></div>' +
          '<div class="chat-in"><input class="inp" id="chatInput" placeholder="Type a message…" /><button class="send" id="chatSend">Send</button></div></div>';

        var media = ad.video_url
          ? '<video class="ad" src="' + esc(ad.video_url) + '" poster="' + esc(ad.image_url) + '" controls playsinline preload="metadata"></video>'
          : '<img class="ad" src="' + esc(ad.image_url) + '" alt="Property — captured live" />';

        document.getElementById('root').innerHTML =
          media +
          '<div class="panel"><h3>Location &amp; contact</h3>' + coordRow + geoBtns + callRow + '</div>' +
          '<div class="panel"><h3>Get in touch</h3>' + actions + '</div>' +
          sender + chat + '<div class="tag">JAMIN PROPERTIES</div>';

        wire();
        startChat();
        if (ad.agent_referral) {
          try {
            fetch(REST + 'rpc/log_referral_click', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, H),
              body: JSON.stringify({ p_code: ad.agent_referral, p_artifact: 'ad', p_channel: 'web', p_device: { ua: navigator.userAgent, lang: navigator.language } }) }).catch(function () {});
          } catch (e) {}
        }
      }

      function wire() {
        var ad = AD;
        var refUrl = ad.agent_referral ? SITE + '/r/' + encodeURIComponent(ad.agent_referral) : SITE;
        var copyBtn = document.getElementById('copyCoord');
        if (copyBtn) copyBtn.onclick = function () {
          var t = Number(ad.lat).toFixed(6) + ', ' + Number(ad.lng).toFixed(6);
          if (navigator.clipboard) navigator.clipboard.writeText(t).then(function () { copyBtn.textContent = 'Copied ✓'; });
        };
        var sc = document.getElementById('saveContact');
        if (sc) sc.onclick = function () {
          var name = ad.agent_name || 'JAMIN Partner';
          var v = ['BEGIN:VCARD', 'VERSION:3.0', 'FN:' + name, 'ORG:JAMIN Properties'];
          if (SHOW_CONTACT && ad.agent_phone) v.push('TEL;TYPE=CELL:' + ad.agent_phone);
          if (ad.agent_referral) v.push('NOTE:JAMIN referral ' + ad.agent_referral);
          v.push('END:VCARD');
          var blob = new Blob([v.join('\r\n')], { type: 'text/vcard' });
          var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = name.replace(/[^a-z0-9]+/gi, '_') + '.vcf';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
        var sh = document.getElementById('shareBtn');
        if (sh) sh.onclick = function () {
          var data = { title: 'JAMIN Properties', text: 'Real property — captured live', url: location.href };
          if (navigator.share) navigator.share(data).catch(function () {});
          else if (navigator.clipboard) navigator.clipboard.writeText(location.href).then(function () { sh.textContent = 'Link copied ✓'; });
        };
        var lc = document.getElementById('liveChatBtn');
        if (lc) lc.onclick = function () { var p = document.getElementById('chatPanel'); if (p) { p.scrollIntoView({ behavior: 'smooth', block: 'start' }); var i = document.getElementById('chatInput'); if (i) setTimeout(function () { i.focus(); }, 350); } };

        // In-app voice/video calls (Jitsi — no install, no infra). Both sides join
        // the same per-ad room; the visitor's call notifies the agent via chat.
        function callRoom() { return 'JAMINAD' + slug.replace(/[^A-Za-z0-9]/g, ''); }
        function startCall(video) {
          var nm = localStorage.getItem('jamin_chat_name');
          if (!nm) { nm = (prompt('Your name (so the advertiser knows who is calling):') || 'Guest').trim() || 'Guest'; try { localStorage.setItem('jamin_chat_name', nm); } catch (e) {} }
          var url = 'https://meet.jit.si/' + callRoom() + '#userInfo.displayName=' + encodeURIComponent('"' + nm + '"') + '&config.prejoinPageEnabled=false' + (video ? '' : '&config.startAudioOnly=true');
          fetch(REST + 'ad_messages', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json', Prefer: 'return=minimal' }, H),
            body: JSON.stringify({ slug: slug, sender: 'visitor', name: nm, body: (video ? '📹 Started a video call' : '📞 Started a voice call') + ' — tap “Join” in your console to connect.' }) }).then(loadMessages).catch(function () {});
          fetch(REST + 'call_logs', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json', Prefer: 'return=minimal' }, H),
            body: JSON.stringify({ slug: slug, initiator: nm, kind: video ? 'video' : 'voice', room: callRoom() }) }).catch(function () {});
          window.open(url, '_blank');
        }
        var vc = document.getElementById('voiceCall'); if (vc) vc.onclick = function () { startCall(false); };
        var vd = document.getElementById('videoCall'); if (vd) vd.onclick = function () { startCall(true); };

        // QR modal
        var modal = document.getElementById('qrModal');
        var trig = document.getElementById('qrTrigger');
        if (trig) trig.onclick = function () {
          document.getElementById('qrBig').src = qrSrc(refUrl, 480);
          document.getElementById('qrDl').href = qrSrc(refUrl, 600);
          modal.classList.add('open');
        };
        document.getElementById('qrClose').onclick = function () { modal.classList.remove('open'); };
        modal.onclick = function (e) { if (e.target === modal) modal.classList.remove('open'); };
        document.getElementById('qrShare').onclick = function () {
          if (navigator.share) navigator.share({ title: 'JAMIN Properties', url: refUrl }).catch(function () {});
          else if (navigator.clipboard) navigator.clipboard.writeText(refUrl).then(function () { this.textContent = 'Copied ✓'; });
        };
      }

      // ── Live chat (polled; keyboard-aware) ────────────────────────────────
      function startChat() {
        var input = document.getElementById('chatInput');
        var send = document.getElementById('chatSend');
        if (!input || !send) return;
        // Keep the input visible when the soft keyboard opens.
        input.addEventListener('focus', function () {
          setTimeout(function () { input.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 250);
        });
        input.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); doSend(); } });
        send.onclick = doSend;
        loadMessages();
        pollTimer = setInterval(loadMessages, 4000);
      }
      function loadMessages() {
        fetch(REST + 'ad_messages?slug=eq.' + encodeURIComponent(slug) + '&hidden=eq.false&select=sender,name,body,created_at&order=created_at.asc', { headers: H })
          .then(function (r) { return r.json(); })
          .then(function (rows) { if (Array.isArray(rows)) renderMessages(rows); })
          .catch(function () {});
      }
      function renderMessages(rows) {
        var log = document.getElementById('chatLog'); if (!log) return;
        if (!rows.length) { log.innerHTML = '<div class="chat-empty">Send a message — we’ll reply right here.</div>'; return; }
        log.innerHTML = rows.map(function (m) {
          var cls = m.sender === 'agent' ? 'a' : 'v';
          var nm = m.sender === 'agent' ? (AD.agent_name || 'JAMIN') : (m.name || 'You');
          return '<div class="msg ' + cls + '"><div class="nm">' + esc(nm) + '</div>' + esc(m.body) + '</div>';
        }).join('');
        if (rows.length !== lastCount) { lastCount = rows.length; log.scrollTop = log.scrollHeight; }
      }
      function doSend() {
        var input = document.getElementById('chatInput');
        var body = (input.value || '').trim(); if (!body) return;
        var nm = localStorage.getItem('jamin_chat_name');
        if (!nm) { nm = (prompt('Your name (so we can reply):') || 'Guest').trim() || 'Guest'; try { localStorage.setItem('jamin_chat_name', nm); } catch (e) {} }
        input.value = '';
        fetch(REST + 'ad_messages', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json', Prefer: 'return=minimal' }, H),
          body: JSON.stringify({ slug: slug, sender: 'visitor', name: nm, body: body }) })
          .then(function () { loadMessages(); })
          .catch(function () {});
      }
    </script>
  </body>
</html>
