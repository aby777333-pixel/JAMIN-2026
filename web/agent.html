<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>JAMIN Properties — Agent</title>
    <link rel="icon" href="/logo.jpg" />
    <meta property="og:title" content="JAMIN Properties — Agent listings" />
    <meta property="og:image" content="https://wonderful-cupcake-0d3074.netlify.app/logo.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --red:#fd0001; --gold:#fbbc15; --gold-deep:#c8911e; --ink:#1a1a1a; --muted:#74746e; --paper:#f7f7f5; --line:#e6e7e2; --charcoal:#1a1a1a; }
      *{box-sizing:border-box} html,body{margin:0}
      body{font-family:Inter,-apple-system,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink)}
      .wrap{max-width:560px;margin:0 auto;padding:18px 14px 48px}
      .state{text-align:center;padding:64px 20px;color:var(--muted)}
      .state img{height:40px;margin-bottom:14px}
      .hero{display:flex;align-items:center;gap:14px;background:var(--charcoal);color:#fff;border-radius:18px;padding:18px}
      .hero img{width:64px;height:64px;border-radius:50%;object-fit:cover;background:#333}
      .hero .nm{font-size:19px;font-weight:700}
      .hero .ds{color:rgba(255,255,255,.8);font-size:13px;margin-top:2px}
      .hero .rf{color:var(--gold);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:6px}
      h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:22px 2px 10px}
      .card{display:block;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;text-decoration:none;color:inherit}
      .card .code{font-family:monospace;font-weight:700;color:var(--gold-deep);font-size:13px}
      .card .pj{font-weight:600;margin-top:3px}
      .card .lo{color:var(--muted);font-size:13px;margin-top:1px}
      .card .pr{font-family:monospace;font-weight:700;font-size:18px;margin-top:6px}
      .cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;text-decoration:none;margin-top:16px;background:var(--red);color:#fff}
      .note{color:var(--muted);font-size:12px;text-align:center;margin-top:14px}
    </style>
  </head>
  <body>
    <div id="root" class="wrap"><div class="state"><img src="/logo.jpg" alt="JAMIN" /><div>Loading…</div></div></div>
    <script>
      var SUPABASE_URL = 'https://oaqwnjgaypmuafvnfhxv.supabase.co';
      var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hcXduamdheXBtdWFmdm5maHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDI2ODAsImV4cCI6MjA5Nzc3ODY4MH0.2tfyC3Z8Kzib8FdLjnE-z8m830PZUd9vfcWtDXIqp3E';
      var H = { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json' };
      var root = document.getElementById('root');
      function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
      function inr(n){return '₹' + Number(n||0).toLocaleString('en-IN');}
      function state(msg){root.innerHTML='<div class="state"><img src="/logo.jpg" alt="JAMIN" /><div>'+esc(msg)+'</div></div>';}

      var parts = location.pathname.split('/').filter(Boolean); // ['a','<code>']
      var raw = parts[1] ? decodeURIComponent(parts[1]) : '';
      var code = /^[A-Za-z0-9_-]{3,40}$/.test(raw) ? raw : '';
      if (!code) { state('Invalid link'); }
      else {
        fetch(SUPABASE_URL + '/rest/v1/rpc/agent_public_profile', {
          method: 'POST', headers: H, body: JSON.stringify({ p_code: code })
        })
        .then(function(r){ return r.json(); })
        .then(function(p){
          if (!p || !p.name) { state('Agent not found'); return; }
          var listings = (p.listings || []).map(function(l){
            return '<a class="card" href="https://wonderful-cupcake-0d3074.netlify.app/p/'+esc(l.id)+'">' +
              '<div class="code">'+esc(l.plot_code)+'</div>' +
              '<div class="pj">'+esc(l.project||'Property')+'</div>' +
              (l.location?'<div class="lo">'+esc(l.location)+'</div>':'') +
              '<div class="pr">'+inr(l.price)+'</div></a>';
          }).join('');
          root.innerHTML =
            '<div class="hero">' +
              (p.photo?'<img src="'+esc(p.photo)+'" alt="" />':'<img src="/logo.jpg" alt="" />') +
              '<div><div class="nm">'+esc(p.name)+'</div>' +
              (p.designation?'<div class="ds">'+esc(p.designation)+'</div>':'') +
              '<div class="rf">'+esc(p.referral_code||'')+'</div></div></div>' +
            '<h2>'+(p.listings&&p.listings.length?p.listings.length+' available listing'+(p.listings.length===1?'':'s'):'No live listings')+'</h2>' +
            (listings || '<div class="note">This agent has no live listings right now.</div>') +
            '<a class="cta" href="https://wonderful-cupcake-0d3074.netlify.app/">Open JAMIN Properties</a>' +
            '<div class="note">Enquiries are handled in-app to keep your details private.</div>';
        })
        .catch(function(){ state('Could not load this page'); });
      }
    </script>
  </body>
</html>
