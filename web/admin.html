<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JAMIN Admin Console</title>
    <meta name="theme-color" content="#FD0001" />
    <link rel="icon" href="logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --red:#fd0001; --red-deep:#c70000; --gold:#fbbc15; --gold-deep:#c8911e; --ink:#1a1a1a;
        --charcoal:#202020; --muted:#74746e; --line:#e6e7e2; --paper:#f7f7f5; --surface:#fff;
        --success:#1e9e5a; --danger:#d4351c; --warn:#e6a10d; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:Inter,-apple-system,"Segoe UI",sans-serif; color:var(--ink); background:var(--paper); }
      .mono { font-family:"JetBrains Mono",monospace; }
      button { font-family:inherit; cursor:pointer; }
      input,select,textarea { font-family:inherit; }
      a { color:var(--red); }
      .hidden { display:none !important; }

      /* Login */
      .login-wrap { min-height:100vh; display:grid; place-items:center; padding:20px; }
      .card { background:var(--surface); border:1px solid var(--line); border-radius:20px; }
      .login { width:100%; max-width:400px; padding:30px; }
      .login img { height:40px; margin-bottom:18px; }
      .login h1 { font-size:22px; margin:0 0 4px; }
      .login p { color:var(--muted); margin:0 0 18px; font-size:14px; }
      label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin:12px 0 6px; }
      .inp { width:100%; height:48px; border:1px solid var(--line); border-radius:12px; padding:0 14px; font-size:16px; outline:none; background:var(--paper); }
      .inp:focus { border-color:var(--red); }
      textarea.inp { height:auto; padding:10px 14px; }
      .btn { border:none; border-radius:12px; padding:12px 18px; font-weight:600; font-size:15px; background:var(--red); color:#fff; }
      .btn:hover { background:var(--red-deep); }
      .btn:disabled { opacity:.5; }
      .btn-g { background:var(--gold); color:var(--ink); } .btn-g:hover{ background:var(--gold-deep); }
      .btn-o { background:var(--surface); color:var(--ink); border:1px solid var(--line); }
      .btn-o:hover { background:var(--paper); }
      .btn-d { background:transparent; color:var(--danger); border:1px solid var(--line); }
      .btn-sm { padding:8px 12px; font-size:13px; border-radius:10px; }
      .full { width:100%; margin-top:16px; }
      .msg { margin-top:12px; font-size:13px; font-weight:600; min-height:16px; }
      .msg.ok { color:var(--success); } .msg.err { color:var(--danger); }

      /* App shell */
      .shell { display:grid; grid-template-columns:230px 1fr; min-height:100vh; }
      .side { background:var(--charcoal); color:#fff; padding:18px 14px; }
      .side .brand { display:flex; align-items:center; gap:8px; padding:6px 8px 16px; }
      .side .brand img { height:30px; border-radius:6px; }
      .side .brand b { font-size:13px; letter-spacing:1px; }
      .nav-i { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent; border:none; color:rgba(255,255,255,.8); padding:11px 12px; border-radius:10px; font-size:14.5px; font-weight:500; }
      .nav-i:hover { background:rgba(255,255,255,.08); color:#fff; }
      .nav-i.active { background:var(--red); color:#fff; }
      .nav-i .dot { margin-left:auto; background:var(--gold); color:var(--ink); font-size:11px; font-weight:700; border-radius:999px; padding:1px 7px; }
      .who { margin-top:22px; padding:10px 12px; font-size:12px; color:rgba(255,255,255,.6); border-top:1px solid rgba(255,255,255,.12); }
      .main { padding:24px 26px; max-width:1100px; }
      .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:12px; }
      .head h2 { margin:0; font-size:24px; font-weight:800; letter-spacing:-.4px; }
      .stat-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
      .stat { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 16px; min-width:120px; }
      .stat .n { font-family:"JetBrains Mono",monospace; font-weight:700; font-size:22px; }
      .stat .l { color:var(--muted); font-size:12px; }

      table { width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
      th,td { text-align:left; padding:11px 14px; border-bottom:1px solid var(--line); font-size:14px; vertical-align:middle; }
      th { background:var(--paper); font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
      tr:last-child td { border-bottom:none; }
      .pill { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:3px 9px; border-radius:999px; }
      .pill.available,.pill.verified,.pill.paid { background:rgba(30,158,90,.14); color:var(--success); }
      .pill.reserved,.pill.pending,.pill.requested,.pill.approved { background:rgba(230,161,13,.16); color:var(--warn); }
      .pill.sold,.pill.rejected { background:rgba(212,53,28,.14); color:var(--danger); }
      .pill.neutral { background:rgba(26,26,26,.08); color:var(--ink); }
      .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      .panel { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:18px; }
      .panel h3 { margin:0 0 12px; font-size:16px; }
      .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
      .thumbs { display:flex; gap:6px; flex-wrap:wrap; }
      .thumbs img { width:40px; height:40px; object-fit:cover; border-radius:6px; border:1px solid var(--line); }
      .muted { color:var(--muted); font-size:13px; }
      select.inp { height:48px; }
      @media (max-width:760px){ .shell{ grid-template-columns:1fr; } .side{ display:flex; gap:6px; overflow-x:auto; } .nav-i{ width:auto; white-space:nowrap; } .who{ display:none; } .grid2{ grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="loginView" class="login-wrap">
      <div class="card login">
        <img src="logo.jpg" alt="JAMIN" />
        <h1>Admin Console</h1>
        <p>Sign in with your Super Admin email. You'll get a 6-digit code.</p>
        <div id="step1">
          <label>Email</label>
          <input id="email" class="inp" type="email" placeholder="admin@example.com" autocomplete="email" />
          <button id="sendBtn" class="btn full">Send code</button>
        </div>
        <div id="step2" class="hidden">
          <label>6-digit code (sent to <span id="emailEcho"></span>)</label>
          <input id="code" class="inp mono" inputmode="numeric" maxlength="6" placeholder="••••••" style="letter-spacing:6px;text-align:center" />
          <button id="verifyBtn" class="btn full">Verify &amp; sign in</button>
          <button id="backBtn" class="btn-o btn full" style="margin-top:8px">Use a different email</button>
        </div>
        <div id="loginMsg" class="msg"></div>
      </div>
    </div>

    <!-- APP -->
    <div id="appView" class="shell hidden">
      <aside class="side">
        <div class="brand"><img src="logo.jpg" alt="" /><b>ADMIN</b></div>
        <button class="nav-i active" data-tab="properties">🏠 Properties</button>
        <button class="nav-i" data-tab="catalog">📁 Catalog</button>
        <button class="nav-i" data-tab="users">👤 Users &amp; roles</button>
        <button class="nav-i" data-tab="crm">📇 CRM / Leads</button>
        <button class="nav-i" data-tab="marketing">🎨 Marketing</button>
        <button class="nav-i" data-tab="territories">🗺️ Territories</button>
        <button class="nav-i" data-tab="approvals">✅ Approvals <span id="apprDot" class="dot hidden">0</span></button>
        <button class="nav-i" data-tab="submissions">🖼️ Photo submissions <span id="subDot" class="dot hidden">0</span></button>
        <button class="nav-i" data-tab="formsubs">📨 Form submissions <span id="formSubDot" class="dot hidden">0</span></button>
        <button class="nav-i" data-tab="sharedads">📢 Shared ads</button>
        <button class="nav-i" data-tab="adchats">📲 Ad chats</button>
        <button class="nav-i" data-tab="payments">💳 Payments</button>
        <button class="nav-i" data-tab="chat">💬 Live chat</button>
        <button class="nav-i" data-tab="forms">📋 Form Builder</button>
        <button class="nav-i" data-tab="features">🧩 Features</button>
        <button class="nav-i" data-tab="content">📝 App Content</button>
        <button class="nav-i" data-tab="announcements">📣 Announcements</button>
        <button class="nav-i" data-tab="config">⚙️ System config</button>
        <div style="margin-top:14px;padding:10px 12px;font-size:11px;line-height:1.55;color:rgba(255,255,255,.6);background:rgba(255,255,255,.06);border-radius:10px">✓ Every change you save here is <b style="color:#7ee2a8">live in the phone app instantly</b> — no deploy needed.</div>
        <div class="who"><span id="whoEmail"></span><br /><button id="signOut" class="btn-o btn-sm" style="margin-top:8px">Sign out</button></div>
      </aside>
      <main class="main">
        <div id="tabProperties"></div>
        <div id="tabCatalog" class="hidden"></div>
        <div id="tabUsers" class="hidden"></div>
        <div id="tabCrm" class="hidden"></div>
        <div id="tabMarketing" class="hidden"></div>
        <div id="tabTerritories" class="hidden"></div>
        <div id="tabApprovals" class="hidden"></div>
        <div id="tabSubmissions" class="hidden"></div>
        <div id="tabFormsubs" class="hidden"></div>
        <div id="tabSharedads" class="hidden"></div>
        <div id="tabAdchats" class="hidden"></div>
        <div id="tabPayments" class="hidden"></div>
        <div id="tabChat" class="hidden"></div>
        <div id="tabForms" class="hidden"></div>
        <div id="tabFeatures" class="hidden"></div>
        <div id="tabContent" class="hidden"></div>
        <div id="tabAnnouncements" class="hidden"></div>
        <div id="tabConfig" class="hidden"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      var SUPABASE_URL = 'https://oaqwnjgaypmuafvnfhxv.supabase.co';
      var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hcXduamdheXBtdWFmdm5maHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDI2ODAsImV4cCI6MjA5Nzc3ODY4MH0.2tfyC3Z8Kzib8FdLjnE-z8m830PZUd9vfcWtDXIqp3E';
      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      // Surface any uncaught error so nothing fails silently.
      function showErr(t) {
        var b = document.getElementById('errbar');
        if (!b) { b = document.createElement('div'); b.id = 'errbar'; b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#c00;color:#fff;padding:10px 14px;font-size:13px;z-index:9999;cursor:pointer'; b.onclick = function () { b.style.display = 'none'; }; document.body.appendChild(b); }
        b.textContent = t + '  (tap to dismiss)'; b.style.display = 'block';
      }
      window.addEventListener('error', function (e) { showErr('Script error: ' + (e.message || '')); });
      window.addEventListener('unhandledrejection', function (e) { showErr('Error: ' + ((e.reason && e.reason.message) || e.reason || '')); });

      var $ = function (id) { return document.getElementById(id); };
      var state = { user: null, projects: [], plans: [], types: [], roles: [], territories: [] };
      var chatThread = null, chatChannel = null;

      // ─── Auth ───────────────────────────────────────────────────────────
      function setLoginMsg(t, ok) { var m = $('loginMsg'); m.textContent = t || ''; m.className = 'msg ' + (ok ? 'ok' : 'err'); }

      $('sendBtn').onclick = async function () {
        var email = $('email').value.trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setLoginMsg('Enter a valid email.', false); return; }
        this.disabled = true; setLoginMsg('Sending…', true);
        var r = await sb.auth.signInWithOtp({ email: email, options: { shouldCreateUser: false } });
        this.disabled = false;
        if (r.error) { setLoginMsg(r.error.message, false); return; }
        $('emailEcho').textContent = email; $('step1').classList.add('hidden'); $('step2').classList.remove('hidden');
        setLoginMsg('Code sent. Check your email.', true);
      };
      $('backBtn').onclick = function () { $('step2').classList.add('hidden'); $('step1').classList.remove('hidden'); setLoginMsg(''); };
      $('verifyBtn').onclick = async function () {
        var email = $('email').value.trim(), token = $('code').value.trim();
        if (!/^\d{6}$/.test(token)) { setLoginMsg('Enter the 6-digit code.', false); return; }
        this.disabled = true; setLoginMsg('Verifying…', true);
        var r = await sb.auth.verifyOtp({ email: email, token: token, type: 'email' });
        this.disabled = false;
        if (r.error) { setLoginMsg(r.error.message, false); return; }
        await boot();
      };
      $('signOut').onclick = async function () { await sb.auth.signOut(); location.reload(); };

      async function boot() {
        var s = await sb.auth.getSession();
        if (!s.data.session) { show('login'); return; }
        state.user = s.data.session.user;
        var prof = await sb.from('profiles').select('email, role:roles(is_admin)').eq('id', state.user.id).maybeSingle();
        var isAdmin = prof.data && prof.data.role && prof.data.role.is_admin === true;
        if (!isAdmin) { setLoginMsg('This account is not an administrator.', false); await sb.auth.signOut(); show('login'); return; }
        $('whoEmail').textContent = prof.data.email || state.user.email;
        show('app');
        await loadLookups();
        switchTab('properties');
        refreshApprovalsBadge();
        refreshSubmissionsBadge();
        refreshFormSubsBadge();
      }
      function show(which) { $('loginView').classList.toggle('hidden', which !== 'login'); $('appView').classList.toggle('hidden', which !== 'app'); }

      // ─── Lookups ────────────────────────────────────────────────────────
      async function loadLookups() {
        var p = await sb.from('projects').select('id,code,name,location,status').order('name');
        var pl = await sb.from('plans').select('id,project_id,name');
        var t = await sb.from('property_types').select('id,slug,name,code_prefix').eq('active', true).order('name');
        var r = await sb.from('roles').select('id,slug,name,level').order('level');
        var tr = await sb.from('territories').select('id,name,parent_id').order('name');
        state.projects = p.data || []; state.plans = pl.data || []; state.types = t.data || []; state.roles = r.data || []; state.territories = tr.data || [];
      }
      function opt(arr, val, labelFn) { return arr.map(function (x) { return '<option value="' + x.id + '"' + (x.id === val ? ' selected' : '') + '>' + labelFn(x) + '</option>'; }).join(''); }
      function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); }
      function inr(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); }

      // ─── Tabs ───────────────────────────────────────────────────────────
      document.querySelectorAll('.nav-i').forEach(function (b) { b.onclick = function () { switchTab(b.dataset.tab); }; });
      function switchTab(tab) {
        document.querySelectorAll('.nav-i').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === tab); });
        ['properties', 'catalog', 'users', 'crm', 'marketing', 'territories', 'approvals', 'submissions', 'formsubs', 'sharedads', 'adchats', 'payments', 'chat', 'forms', 'features', 'content', 'announcements', 'config'].forEach(function (t) { $('tab' + t[0].toUpperCase() + t.slice(1)).classList.toggle('hidden', t !== tab); });
        if (tab === 'properties') renderProperties();
        if (tab === 'catalog') renderCatalog();
        if (tab === 'users') renderUsers();
        if (tab === 'crm') renderCrm();
        if (tab === 'marketing') renderMarketing();
        if (tab === 'territories') renderTerritories();
        if (tab === 'approvals') renderApprovals();
        if (tab === 'submissions') renderSubmissions();
        if (tab === 'formsubs') renderFormSubs();
        if (tab === 'sharedads') renderSharedAds();
        if (tab === 'adchats') renderAdChats();
        if (tab === 'payments') renderPayments();
        if (tab === 'chat') renderChat();
        if (tab === 'forms') renderFormBuilder();
        if (tab === 'features') renderFeatures();
        if (tab === 'content') renderAppContent();
        if (tab === 'announcements') renderAnnouncements();
        if (tab === 'config') renderConfig();
      }

      // ─── Properties ─────────────────────────────────────────────────────
      // Reserved attrs keys (have dedicated fields / behaviour) — excluded from "custom fields".
      var PROP_RESERVED = ['video_tour', 'virtual_tour', 'walkthrough', 'title', 'description', 'featured'];
      // Land-area units used across India (incl. South-Indian: cents, grounds, ankanam, guntha).
      var AREA_UNITS = ['sq ft', 'sq yards (gaj)', 'sq meters', 'acres', 'cents', 'grounds', 'ankanam', 'guntha', 'bigha', 'kanal', 'marla', 'katha', 'hectare'];
      var FACINGS = ['East', 'West', 'North', 'South', 'North-East', 'North-West', 'South-East', 'South-West'];
      // Guided spec fields → each saved as a human-labelled attrs entry (key = label), so the
      // app renders it automatically and it stays editable as a custom field afterwards.
      var PROP_SPECS = [
        { key: 'Built-up area', ph: 'e.g. 1800 sq ft' },
        { key: 'Carpet area', ph: 'e.g. 1500 sq ft' },
        { key: 'Dimensions', ph: 'e.g. 30 × 40 ft' },
        { key: 'Bedrooms', ph: 'e.g. 3 BHK' },
        { key: 'Bathrooms', ph: 'e.g. 2' },
        { key: 'Floors', ph: 'e.g. G+2' },
        { key: 'Road width', ph: 'e.g. 40 ft' },
        { key: 'Approval', ph: 'e.g. DTCP / RERA / CMDA' },
      ];
      function specInputsHTML() {
        var areaUnits = AREA_UNITS.map(function (u) { return '<option value="' + esc(u) + '">' + esc(u) + '</option>'; }).join('');
        var facings = '<option value="">—</option>' + FACINGS.map(function (f) { return '<option value="' + esc(f) + '">' + esc(f) + '</option>'; }).join('');
        var texts = PROP_SPECS.map(function (s) {
          return '<div><label>' + esc(s.key) + '</label><input class="inp ns_spec" data-key="' + esc(s.key) + '" placeholder="' + esc(s.ph || '') + '" /></div>';
        }).join('');
        return '<div style="grid-column:1/-1"><label>Plot area</label><div class="row">' +
            '<input id="ns_area" class="inp" inputmode="decimal" style="max-width:160px" placeholder="e.g. 2400" />' +
            '<select id="ns_area_unit" class="inp" style="max-width:180px">' + areaUnits + '</select>' +
          '</div></div>' +
          '<div><label>Facing</label><select id="ns_facing" class="inp">' + facings + '</select></div>' +
          '<div><label>Corner plot</label><select id="ns_corner" class="inp"><option value="">—</option><option>Yes</option><option>No</option></select></div>' +
          texts;
      }
      function collectSpecs() {
        var out = {};
        var area = $('ns_area') ? $('ns_area').value.trim() : '';
        if (area) out['Plot area'] = area + (($('ns_area_unit') && $('ns_area_unit').value) ? ' ' + $('ns_area_unit').value : '');
        var facing = $('ns_facing') ? $('ns_facing').value : ''; if (facing) out['Facing'] = facing;
        var corner = $('ns_corner') ? $('ns_corner').value : ''; if (corner) out['Corner plot'] = corner;
        document.querySelectorAll('#tabProperties .ns_spec').forEach(function (i) {
          var v = i.value.trim(); if (v) out[i.dataset.key] = v;
        });
        return out;
      }
      function cfRow(k, v) {
        return '<div class="row cf-row" style="margin-top:6px">' +
          '<input class="inp cf_k" style="max-width:200px;height:38px" placeholder="Field name (e.g. Bedrooms)" value="' + esc(k || '') + '" />' +
          '<input class="inp cf_v" style="max-width:240px;height:38px" placeholder="Value (e.g. 3 BHK)" value="' + esc(v || '') + '" />' +
          '<button type="button" class="btn-d btn-sm cf_rm">×</button></div>';
      }
      function customRowsFor(attrs) {
        if (!attrs || typeof attrs !== 'object') return '';
        return Object.keys(attrs).filter(function (k) { return PROP_RESERVED.indexOf(k) === -1; })
          .map(function (k) { return cfRow(k, attrs[k]); }).join('');
      }
      function wireAddField(btn, container) {
        btn.onclick = function () {
          var wrap = document.createElement('div'); wrap.innerHTML = cfRow('', '');
          var row = wrap.firstChild; container.appendChild(row);
          row.querySelector('.cf_rm').onclick = function () { row.remove(); };
        };
      }
      function wireRemovers(scope) {
        scope.querySelectorAll('.cf_rm').forEach(function (b) { b.onclick = function () { var r = b.closest('.cf-row'); if (r) r.remove(); }; });
      }
      function collectCustom(scope) {
        var out = {};
        scope.querySelectorAll('.cf-row').forEach(function (row) {
          var k = row.querySelector('.cf_k').value.trim();
          var v = row.querySelector('.cf_v').value.trim();
          if (k && v && PROP_RESERVED.indexOf(k.toLowerCase()) === -1) out[k] = v;
        });
        return out;
      }
      function photoThumb(url) {
        return '<span class="ph" data-url="' + esc(url) + '" style="position:relative;display:inline-block">' +
          '<img src="' + esc(url) + '" style="height:58px;width:58px;object-fit:cover;border-radius:8px;border:1px solid #e6e7e2" />' +
          '<a href="' + esc(url) + '" download target="_blank" rel="noopener" title="Download" style="position:absolute;bottom:-6px;left:-6px;background:#1a1a1a;color:#fff;border-radius:999px;width:18px;height:18px;line-height:18px;font-size:11px;text-align:center;text-decoration:none">⤓</a>' +
          '<button type="button" class="ph_rm" title="Remove photo" style="position:absolute;top:-6px;right:-6px;background:#c00;color:#fff;border:none;border-radius:999px;width:18px;height:18px;line-height:16px;font-size:12px;cursor:pointer">×</button></span>';
      }
      function photoThumbs(media) {
        var arr = Array.isArray(media) ? media : [];
        if (!arr.length) return '<span class="muted" style="font-size:12px">No photos yet — add some below.</span>';
        return arr.map(function (m) { return photoThumb(m.url || m); }).join('');
      }
      function mediaPath(url) {
        var i = url.indexOf('/property-media/');
        return i === -1 ? null : decodeURIComponent(url.slice(i + '/property-media/'.length));
      }

      async function renderProperties() {
        var el = $('tabProperties');
        el.innerHTML = '<div class="head"><h2>Properties</h2></div><div class="muted">Loading…</div>';

          fields[i] = o;

        function parseVal(raw) { try { return JSON.parse(raw); } catch (e) { return raw; } }
        $('cfg_add').onclick = async function () {
          var k = $('cfg_key').value.trim(); if (!k) return;
          var r = await sb.from('system_config').upsert({ key: k, value: parseVal($('cfg_val').value) });
          if (r.error) return alert(r.error.message); renderConfig();
        };
        el.querySelectorAll('tr[data-k]').forEach(function (tr) {
          tr.querySelector('.cfg_save').onclick = async function () {
            this.textContent = '…';
            var r = await sb.from('system_config').update({ value: parseVal(tr.querySelector('.cfg_edit').value) }).eq('key', tr.dataset.k);
            this.textContent = r.error ? 'Err' : 'Saved'; if (r.error) alert(r.error.message);
          };
        });
      }

      // ─── Features (dynamic feature registry — add / edit / toggle / reorder) ───
      async function renderFeatures() {
        var el = $('tabFeatures');
        el.innerHTML = '<div class="head"><h2>Features</h2></div><div class="muted">Loading…</div>';
        var q = await sb.from('app_features').select('id,key,name,description,category,icon,enabled,sort_order').order('sort_order');
        if (q.error) { el.innerHTML = '<div class="head"><h2>Features</h2></div><div class="muted">' + esc(q.error.message) + '</div>'; return; }
        var rows = q.data || [];
        var cats = ['core', 'buyer', 'partner', 'admin', 'ai'];
        function catOpts(sel) { return cats.map(function (c) { return '<option value="' + c + '"' + (c === sel ? ' selected' : '') + '>' + c + '</option>'; }).join(''); }
        el.innerHTML = '<div class="head"><h2>Features</h2></div>' +
          '<div class="panel"><h3>Add a feature</h3><div class="row">' +
            '<input id="ft_key" class="inp" style="max-width:160px" placeholder="key (e.g. live_chat)" />' +
            '<input id="ft_name" class="inp" style="max-width:220px" placeholder="Name" />' +
            '<select id="ft_cat" class="inp" style="max-width:130px">' + catOpts('core') + '</select>' +
            '<input id="ft_icon" class="inp" style="max-width:140px" placeholder="ionicons icon" />' +
            '<input id="ft_order" class="inp" type="number" style="max-width:90px" placeholder="order" />' +
            '<button id="ft_add" class="btn btn-sm">Add</button></div>' +
            '<div class="row" style="margin-top:6px"><input id="ft_desc" class="inp" style="max-width:560px" placeholder="Description" /></div>' +
            '<div class="muted" style="margin-top:6px">Toggling a feature off hides it from the in-app catalog. Existing screens keep working regardless.</div></div>' +
          (rows.length ? '<table><thead><tr><th>On</th><th>Name</th><th>Key</th><th>Category</th><th>Icon</th><th>Order</th><th></th></tr></thead><tbody>' +
          rows.map(function (f) {
            return '<tr data-id="' + f.id + '">' +
              '<td><input type="checkbox" class="ft_en"' + (f.enabled ? ' checked' : '') + ' /></td>' +
              '<td><input class="inp ft_name2" style="width:200px;height:36px" value="' + esc(f.name) + '" /></td>' +
              '<td class="mono">' + esc(f.key) + '</td>' +
              '<td><select class="inp ft_cat2" style="height:36px">' + catOpts(f.category) + '</select></td>' +
              '<td><input class="inp ft_icon2" style="width:120px;height:36px" value="' + esc(f.icon) + '" /></td>' +
              '<td><input class="inp ft_order2" type="number" style="width:70px;height:36px" value="' + (f.sort_order || 0) + '" /></td>' +
              '<td><button class="btn btn-sm ft_save">Save</button> <button class="btn btn-sm ft_del" style="background:#fee;color:#c00">Del</button></td></tr>';
          }).join('') + '</tbody></table>' : '<div class="muted">No features yet.</div>');
        $('ft_add').onclick = async function () {
          var key = $('ft_key').value.trim(); var name = $('ft_name').value.trim();
          if (!key || !name) return alert('Key and name are required.');
          var body = { key: key, name: name, category: $('ft_cat').value, icon: $('ft_icon').value.trim() || 'cube', description: $('ft_desc').value.trim() || null };
          var ord = parseInt($('ft_order').value, 10); if (!isNaN(ord)) body.sort_order = ord;
          var r = await sb.from('app_features').insert(body);
          if (r.error) return alert(r.error.message); renderFeatures();
        };
        el.querySelectorAll('tr[data-id]').forEach(function (tr) {
          var id = tr.dataset.id;
          tr.querySelector('.ft_save').onclick = async function () {
            this.textContent = '…';
            var ord = parseInt(tr.querySelector('.ft_order2').value, 10);
            var r = await sb.from('app_features').update({
              name: tr.querySelector('.ft_name2').value.trim(),
              category: tr.querySelector('.ft_cat2').value,
              icon: tr.querySelector('.ft_icon2').value.trim() || 'cube',
              enabled: tr.querySelector('.ft_en').checked,
              sort_order: isNaN(ord) ? 100 : ord
            }).eq('id', id);
            this.textContent = r.error ? 'Err' : 'Saved'; if (r.error) alert(r.error.message);
          };
          tr.querySelector('.ft_en').onchange = async function () {
            var r = await sb.from('app_features').update({ enabled: this.checked }).eq('id', id);
            if (r.error) { alert(r.error.message); this.checked = !this.checked; }
          };
          tr.querySelector('.ft_del').onclick = async function () {
            if (!confirm('Delete this feature?')) return;
            var r = await sb.from('app_features').delete().eq('id', id);
            if (r.error) return alert(r.error.message); renderFeatures();
          };
        });
      }

      // ─── Payments (booking payments — tracking + manual mark-paid) ──────
      async function renderPayments() {
        var el = $('tabPayments');
        el.innerHTML = '<div class="head"><h2>Payments</h2></div><div class="muted">Loading…</div>';
        var q = await sb.from('payments')
          .select('id,amount,status,method,gateway,created_at, booking:bookings(status, property:properties(plot_code), buyer:profiles!buyer_id(full_name))')
          .order('created_at', { ascending: false }).limit(300);
        if (q.error) { el.innerHTML = '<div class="head"><h2>Payments</h2></div><div class="muted">' + esc(q.error.message) + '</div>'; return; }
        var rows = q.data || [];
        var collected = rows.filter(function (p) { return p.status === 'paid'; }).reduce(function (s, p) { return s + Number(p.amount || 0); }, 0);
        el.innerHTML = '<div class="head"><h2>Payments</h2></div>' +
          '<div class="stat-row"><div class="stat"><div class="n">' + rows.length + '</div><div class="l">Records</div></div>' +
            '<div class="stat"><div class="n mono">' + inr(collected) + '</div><div class="l">Collected</div></div></div>' +
          (rows.length ? '<table><thead><tr><th>Plot</th><th>Buyer</th><th>Amount</th><th>Via</th><th>Status</th><th>Action</th></tr></thead><tbody>' +
          rows.map(function (p) {
            var b = p.booking || {};
            return '<tr data-id="' + p.id + '"><td class="mono">' + esc(b.property ? b.property.plot_code : '—') + '</td>' +
              '<td>' + esc(b.buyer ? b.buyer.full_name : '—') + '</td><td class="mono">' + inr(p.amount) + '</td>' +
              '<td>' + esc(p.gateway || p.method || '—') + '</td>' +
              '<td><span class="pill ' + (p.status === 'paid' ? 'paid' : p.status === 'created' ? 'requested' : 'neutral') + '">' + esc(p.status) + '</span></td>' +
              '<td>' + (p.status !== 'paid' ? '<button class="btn-g btn-sm pay_mark">Mark paid</button>' : '✓') + '</td></tr>';
          }).join('') + '</tbody></table>' : '<div class="muted">No payments yet. Booking payments appear here once buyers reserve and pay.</div>');
        el.querySelectorAll('.pay_mark').forEach(function (btn) {
          btn.onclick = async function () {
            var id = btn.closest('tr').dataset.id; this.textContent = '…';
            var r = await sb.from('payments').update({ status: 'paid' }).eq('id', id);
            if (r.error) { this.textContent = 'Err'; return alert(r.error.message); }
            renderPayments();
          };
        });
      }

      // ─── Live chat (support console, Realtime) ──────────────────────────
      async function renderChat() {
        var el = $('tabChat');
        el.innerHTML = '<div class="head"><h2>Live chat</h2></div>' +
          '<div class="row" style="align-items:flex-start;gap:16px">' +
            '<div id="threadList" style="width:280px"></div>' +
            '<div id="msgPane" style="flex:1;min-width:0"><div class="muted">Select a conversation.</div></div>' +
          '</div>';
        await loadThreads();
        if (!chatChannel) {
          chatChannel = sb.channel('admin-chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, function (p) {
              if (chatThread && p.new && p.new.thread_id === chatThread) loadMessages(chatThread);
              loadThreads();
            })
            .subscribe();
        }
      }
      async function loadThreads() {
        var tl = $('threadList'); if (!tl) return;
        var q = await sb.from('chat_threads')
          .select('id,status,last_message_at, buyer:profiles!buyer_id(full_name)')
          .order('last_message_at', { ascending: false }).limit(100);
        var rows = q.data || [];
        tl.innerHTML = '<div class="muted" style="margin-bottom:6px">Conversations</div>' +
          (rows.length ? rows.map(function (t) {
            return '<div class="chatThreadItem" data-id="' + t.id + '" style="padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer;background:' + (t.id === chatThread ? 'var(--paper)' : '#fff') + '">' +
              '<b>' + esc(t.buyer ? t.buyer.full_name : 'Member') + '</b>' + (t.status === 'resolved' ? ' <span class="pill paid" style="font-size:9px">resolved</span>' : '') +
              '<br><span class="muted" style="font-size:11px">' + new Date(t.last_message_at).toLocaleString() + '</span></div>';
          }).join('') : '<div class="muted">No conversations yet.</div>');
        tl.querySelectorAll('.chatThreadItem').forEach(function (d) {
          d.onclick = function () { chatThread = d.dataset.id; loadThreads(); loadMessages(chatThread); };
        });
      }
      async function loadMessages(tid) {
        var mp = $('msgPane'); if (!mp) return;
        var th = await sb.from('chat_threads').select('status, buyer:profiles!buyer_id(full_name)').eq('id', tid).maybeSingle();
        var tStatus = (th.data && th.data.status) || 'open';
        var tName = (th.data && th.data.buyer && th.data.buyer.full_name) || 'Member';
        var q = await sb.from('messages').select('id,sender_id,body,created_at').eq('thread_id', tid).order('created_at');
        var rows = q.data || [];
        mp.innerHTML = '<div class="row" style="justify-content:space-between;margin-bottom:8px">' +
            '<div><b>' + esc(tName) + '</b> <span class="pill ' + (tStatus === 'resolved' ? 'paid' : 'requested') + '">' + esc(tStatus) + '</span></div>' +
            '<button id="chatResolve" class="btn-o btn-sm">' + (tStatus === 'resolved' ? 'Reopen' : 'Mark resolved') + '</button>' +
          '</div>' +
          '<div style="border:1px solid var(--line);border-radius:12px;height:440px;display:flex;flex-direction:column;overflow:hidden">' +
          '<div id="msgScroll" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px">' +
          rows.map(function (m) {
            var mine = m.sender_id === state.user.id;
            return '<div style="max-width:75%;padding:8px 12px;border-radius:12px;font-size:14px;' + (mine ? 'align-self:flex-end;background:var(--red);color:#fff' : 'align-self:flex-start;background:var(--paper);color:var(--ink)') + '">' + esc(m.body) + '</div>';
          }).join('') +
          '</div>' +
          '<div class="row" style="padding:8px;border-top:1px solid var(--line)"><input id="chatInput" class="inp" style="flex:1" placeholder="Reply…" /><button id="chatSend" class="btn btn-sm">Send</button></div></div>';
        var sc = $('msgScroll'); if (sc) sc.scrollTop = sc.scrollHeight;
        $('chatSend').onclick = sendChat;
        $('chatInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') sendChat(); });
        $('chatResolve').onclick = async function () {
          var ns = tStatus === 'resolved' ? 'open' : 'resolved';
          this.disabled = true;
          var r = await sb.from('chat_threads').update({ status: ns }).eq('id', tid);
          this.disabled = false;
          if (r.error) { alert(r.error.message); return; }
          loadThreads(); loadMessages(tid);
        };
      }
      async function sendChat() {
        var inp = $('chatInput'); var body = (inp.value || '').trim(); if (!body || !chatThread) return;
        inp.value = '';
        var r = await sb.from('messages').insert({ thread_id: chatThread, sender_id: state.user.id, body: body });
        if (r.error) { alert(r.error.message); return; }
        loadMessages(chatThread);
      }

      boot();
    </script>
  </body>
</html>
