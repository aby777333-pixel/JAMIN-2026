# JAMIN Properties — Netlify config for the one-page marketing site.
# The site is the static folder web/. The Expo mobile app (src/, app.json) is NOT a
# web build and is never built by Netlify. Setting base=web means Netlify runs inside
# web/ (which has no package.json) so it skips dependency install and the RN build.
[build]
  base = "web"
  publish = "."
  command = "echo 'JAMIN landing — static site, no build step'"

[functions]
  directory = "netlify/functions"

# Shared property ads (/ad/<slug>) → serverless function that injects the ad's
# real og:image (for WhatsApp/social previews), then serves the interactive page.
[[redirects]]
  from = "/ad/*"
  to = "/.netlify/functions/ad"
  status = 200

# Referral share links (/r/<code>) → click-tracking landing.
[[redirects]]
  from = "/r/*"
  to = "/r.html"
  status = 200

# Per-agent public landing pages (/a/<referral_code>) → agent listings page.
[[redirects]]
  from = "/a/*"
  to = "/agent.html"
  status = 200

# Single-page site: serve existing files (logo.jpg, etc.), otherwise the page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
